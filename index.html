<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coder-Sopify — Development Environment Setup</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Guide on how to set up and use Claude Code (coder) and customized development environment tools.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Premium Dark Theme for Docsify -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  
  <!-- ponytail: minor style overrides for better aesthetics -->
  <style>
    :root {
      --theme-color: #3b82f6;
    }
    .markdown-section {
      max-width: 850px;
      padding: 30px 15px 40px;
    }
    body {
      font-family: 'Outfit', 'Plus Jakarta Sans', -apple-system, sans-serif;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>
  <script>
    window.$docsify = {
      name: 'Coder-Sopify',
      repo: 'Siam-GS-Battery/coder-sopify',
      auto2top: true,
      executeScript: true,
      mergeNavbar: true,
      maxLevel: 4,
      subMaxLevel: 3
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
